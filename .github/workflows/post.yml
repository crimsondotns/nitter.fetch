name: Post

on:
  schedule:
    # 13:00 UTC (20:00 Bangkok Time) every day
    - cron: "0 13 * * *"
  workflow_dispatch: # Allow manual run

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          pip install gspread google-auth requests

      - name: Restore progress
        uses: actions/cache/restore@v4
        with:
          path: nitter_progress.json
          key: progress-${{ github.workflow }}-${{ github.run_id }}
          restore-keys: |
            progress-${{ github.workflow }}-

      - name: Run script
        env:
          SERVICE_ACCOUNT: ${{ secrets.SERVICE_ACCOUNT }}
          X_BEARER: ${{ secrets.X_BEARER }}
          X_COOKIE_STRING: ${{ secrets.X_COOKIE_STRING }}
          X_AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
          X_CT0: ${{ secrets.X_CT0 }}
          X_GUEST_TOKEN: ${{ secrets.X_GUEST_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python index_post.py

      - name: Save progress
        uses: actions/cache/save@v4
        if: always()
        with:
          path: nitter_progress.json
          key: progress-${{ github.workflow }}-${{ github.run_id }}-${{ github.run_attempt }}
